name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    if: ${{ github.event_name == 'workflow_dispatch' || vars.OPTIO_DEPLOY_SITE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@optio/site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

  deploy:
    name: Deploy to Pages
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' || vars.OPTIO_DEPLOY_SITE == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
